services:
  kafka:
    image: apache/kafka:3.9.1
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 20s
      timeout: 10s
      retries: 10

  nifi:
    image: apache/nifi:2.7.0
    container_name: nifi
    hostname: nifi
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8443:8443"
    environment:
      SINGLE_USER_CREDENTIALS_USERNAME: admin
      SINGLE_USER_CREDENTIALS_PASSWORD: adminadminadmin
      NIFI_WEB_HTTPS_PORT: 8443
    volumes:
      - ./nifi/input:/opt/nifi/nifi-current/input
      - ./nifi/raw-archive:/opt/nifi/nifi-current/raw-archive
      - ./nifi/README.md:/opt/nifi/nifi-current/docs/README.md:ro

  gps-generator:
    image: python:3.12-slim
    container_name: gps-generator
    hostname: gps-generator
    command: ["python", "/opt/generator/gps_generator.py"]
    volumes:
      - ./scripts/gps_generator.py:/opt/generator/gps_generator.py:ro
      - ./data/graph:/opt/generator/data/graph:ro
      - ./data/master:/opt/generator/data/master:ro
      - ./nifi/input:/out

  hadoop:
    build:
      context: .
      dockerfile: docker/hadoop/Dockerfile
    container_name: hadoop
    hostname: hadoop
    environment:
      HADOOP_HOME: /opt/hadoop
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      YARN_CONF_DIR: /opt/hadoop/etc/hadoop
      JAVA_HOME: /opt/java/openjdk
      CLUSTER_NAME: pseudo-single-node
    ports:
      - "9870:9870"
      - "9864:9864"
      - "8088:8088"
      - "19888:19888"
      - "9000:9000"
    volumes:
      - hadoop_data:/data/hdfs
      - ./data:/opt/project-data:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9870 >/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

  raw-hdfs-loader:
    build:
      context: .
      dockerfile: docker/hadoop/Dockerfile
    container_name: raw-hdfs-loader
    hostname: raw-hdfs-loader
    depends_on:
      hadoop:
        condition: service_healthy
    entrypoint: ["/bin/bash", "/opt/hadoop/bootstrap/load-nifi-raw-to-hdfs.sh"]
    volumes:
      - ./docker/hadoop/scripts/load-nifi-raw-to-hdfs.sh:/opt/hadoop/bootstrap/load-nifi-raw-to-hdfs.sh:ro
      - ./nifi/raw-archive:/opt/nifi-raw
      - ./docker/hadoop/conf:/opt/hadoop/etc/hadoop:ro

  postgres-metastore:
    image: postgres:16
    container_name: postgres-metastore
    hostname: postgres-metastore
    environment:
      POSTGRES_DB: metastore
      POSTGRES_USER: hive
      POSTGRES_PASSWORD: hive
    ports:
      - "5433:5432"
    volumes:
      - postgres_metastore_data_v3:/var/lib/postgresql/data

  hive-metastore:
    build:
      context: .
      dockerfile: docker/hive/Dockerfile
    container_name: hive-metastore
    hostname: hive-metastore
    depends_on:
      hadoop:
        condition: service_healthy
      postgres-metastore:
        condition: service_started
    environment:
      SERVICE_NAME: metastore
      DB_DRIVER: postgres
      SKIP_SCHEMA_INIT: "true"
      IS_RESUME: "true"
      HADOOP_HOME: /opt/hadoop
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HIVE_CUSTOM_CONF_DIR: /opt/hive/conf
    ports:
      - "9083:9083"
    volumes:
      - ./docker/hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./docker/hadoop/conf:/opt/hadoop/etc/hadoop:ro

  hive-server:
    build:
      context: .
      dockerfile: docker/hive/Dockerfile
    container_name: hive-server
    hostname: hive-server
    depends_on:
      hive-metastore:
        condition: service_started
    environment:
      SERVICE_NAME: hiveserver2
      DB_DRIVER: postgres
      SKIP_SCHEMA_INIT: "true"
      IS_RESUME: "true"
      HIVE_METASTORE_URI: thrift://hive-metastore:9083
      SERVICE_OPTS: -Dhive.metastore.uris=thrift://hive-metastore:9083
      HADOOP_HOME: /opt/hadoop
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      HIVE_CUSTOM_CONF_DIR: /opt/hive/conf
    ports:
      - "10000:10000"
      - "10002:10002"
    volumes:
      - ./docker/hive/conf/hive-site.xml:/opt/hive/conf/hive-site.xml:ro
      - ./docker/hadoop/conf:/opt/hadoop/etc/hadoop:ro

  cassandra:
    image: cassandra:5.0
    container_name: cassandra
    hostname: cassandra
    ports:
      - "9042:9042"
    environment:
      CASSANDRA_CLUSTER_NAME: LogisticsCluster
      CASSANDRA_DC: dc1
      CASSANDRA_RACK: rack1
      MAX_HEAP_SIZE: 1G
      HEAP_NEWSIZE: 256M
    volumes:
      - cassandra_data:/var/lib/cassandra

  spark-client:
    build:
      context: .
      dockerfile: docker/spark-client/Dockerfile
    container_name: spark-client
    hostname: spark-client
    depends_on:
      kafka:
        condition: service_healthy
      hadoop:
        condition: service_healthy
      hive-server:
        condition: service_started
      cassandra:
        condition: service_started
    environment:
      JAVA_HOME: /opt/java/openjdk
      HADOOP_CONF_DIR: /opt/hadoop/etc/hadoop
      YARN_CONF_DIR: /opt/hadoop/etc/hadoop
      SPARK_HOME: /opt/spark
      HIVE_CONF_DIR: /opt/spark/conf
    volumes:
      - ./spark-app:/opt/spark-app
      - ./data:/opt/project-data:ro
      - ./docker/hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - ./docker/hive/conf/hive-site.xml:/opt/spark/conf/hive-site.xml:ro
    tty: true

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
    container_name: logistics-dashboard
    hostname: logistics-dashboard
    depends_on:
      - nifi
      - spark-client
      - cassandra
    environment:
      DASHBOARD_HOST: 0.0.0.0
      DASHBOARD_PORT: "8501"
      PROJECT_ROOT: /opt/project
      CASSANDRA_HOST: cassandra
      CASSANDRA_PORT: "9042"
      CASSANDRA_KEYSPACE: transport
      CASSANDRA_TABLE: vehicle_latest_state
    ports:
      - "8501:8501"
    volumes:
      - ./:/opt/project:ro

  airflow-postgres:
    image: postgres:16
    container_name: airflow-postgres
    hostname: airflow-postgres
    environment:
      POSTGRES_DB: airflow
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
    ports:
      - "5434:5432"
    volumes:
      - airflow_postgres_data:/var/lib/postgresql/data

  airflow-init:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-init
    user: "0:0"
    depends_on:
      airflow-postgres:
        condition: service_started
    entrypoint: /bin/bash
    command:
      - -c
      - |
        airflow db migrate && \
        airflow users create \
          --username airflow \
          --password airflow \
          --firstname Air \
          --lastname Flow \
          --role Admin \
          --email airflow@example.local
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/project
      - ./docker/hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-webserver:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-webserver
    hostname: airflow-webserver
    user: "0:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: webserver
    ports:
      - "8080:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/project
      - ./docker/hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - /var/run/docker.sock:/var/run/docker.sock

  airflow-scheduler:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    user: "0:0"
    depends_on:
      airflow-init:
        condition: service_completed_successfully
    command: scheduler
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@airflow-postgres:5432/airflow
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/project
      - ./docker/hadoop/conf:/opt/hadoop/etc/hadoop:ro
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  hadoop_data:
  postgres_metastore_data_v3:
  cassandra_data:
  airflow_postgres_data:

networks:
  default:
    name: proyectobigdata-net
